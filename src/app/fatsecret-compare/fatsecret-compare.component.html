<div class="overlay-backdrop" (click)="onClose()"></div>

<div class="compare-panel"
     [style.left.px]="position.x"
     [style.top.px]="position.y"
     (mousemove)="onMouseMove($event)"
     (mouseup)="onMouseUp()"
     (mouseleave)="onMouseUp()">

  <!-- Draggable header -->
  <div class="panel-header" (mousedown)="onMouseDown($event)">
    <span class="header-title">FatSecret Compare</span>
    <div class="header-actions">
      <button mat-raised-button color="primary" class="overwrite-btn"
              (click)="onOverwrite()"
              [disabled]="!selectedMatch || !selectedServing">
        Overwrite
      </button>
      <button mat-icon-button class="close-btn" (click)="onClose()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <!-- Food match picker -->
  <div class="picker-section" *ngIf="data && data.matches.length > 1">
    <label class="picker-label">FatSecret Match</label>
    <select class="picker-select"
            [(ngModel)]="selectedMatchIndex"
            (ngModelChange)="onMatchChanged()">
      <option *ngFor="let m of data.matches; let i = index" [ngValue]="i">
        {{m.foodName}}{{m.brandName ? ' (' + m.brandName + ')' : ''}} — {{m.summaryCalsPer100g}} cal, {{m.summaryProteinPer100g}}g protein
      </option>
    </select>
  </div>

  <!-- Single match display -->
  <div class="match-name" *ngIf="data && data.matches.length === 1">
    <strong>{{selectedMatch?.foodName}}</strong>
    <span class="food-type-badge">{{selectedMatch?.foodType}}</span>
  </div>

  <!-- Serving picker -->
  <div class="picker-section" *ngIf="selectedMatch">
    <label class="picker-label">Serving (for Unit/GramsPerUnit)</label>
    <select class="picker-select"
            [(ngModel)]="selectedServingIndex"
            (ngModelChange)="onServingChanged()">
      <option *ngFor="let s of selectedMatch.servings; let i = index" [ngValue]="i">
        {{s.servingDescription}} → {{s.mappedUnit}} ({{s.gramsPerUnit}}g/unit)
        {{s.isDefault ? ' [default]' : ''}}
      </option>
    </select>
  </div>

  <!-- Scrollable comparison body -->
  <div class="compare-body">
    <!-- Serving info comparison -->
    <div class="section-header">Serving Info</div>
    <table class="compare-table">
      <thead>
        <tr>
          <th class="label-col">Field</th>
          <th class="value-col">Current</th>
          <th class="value-col">FatSecret</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of servingInfoRows"
            [class.differs]="row.differs">
          <td class="label-col">{{row.label}}</td>
          <td class="value-col">{{row.current}}</td>
          <td class="value-col">{{row.fatsecret}}</td>
        </tr>
      </tbody>
    </table>

    <!-- Nutrition comparison (per 100g) -->
    <div class="section-header">Nutrition (per 100g)</div>
    <table class="compare-table">
      <thead>
        <tr>
          <th class="label-col">Nutrient</th>
          <th class="value-col">Current</th>
          <th class="value-col">FatSecret</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of nutrientRows"
            [class.differs]="row.differs">
          <td class="label-col">{{row.label}}</td>
          <td class="value-col">{{row.currentValue}} {{row.unit}}</td>
          <td class="value-col">{{row.fatsecretValue}} {{row.unit}}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
